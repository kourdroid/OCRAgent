services:
  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    restart: unless-stopped
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gemini-3-flash-preview}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: ["uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./data:/app/data

  worker:
    build: .
    restart: unless-stopped
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gemini-3-flash-preview}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "src.worker.worker"]
    volumes:
      - ./data:/app/data

volumes:
  redis-data:
